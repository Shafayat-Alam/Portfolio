<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shafayat Alam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav id="nav">
    <a href="#hero" class="nav-logo">SA</a>
    <div class="nav-links">
      <a href="#work">Work</a>
      <a href="#skills">Skills</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <section id="hero">
    <div class="hero-bg-grid"></div>
    <div class="hero-inner">
      <div class="hero-name">
        <span id="hero-first"></span>
        <span id="hero-last"></span>
      </div>
      <div class="hero-sub">
        <span id="hero-title"></span>
        <span class="hero-sep">·</span>
        <span id="hero-edu"></span>
      </div>
      <div class="hero-location" id="hero-location"></div>
    </div>
    <div class="hero-scroll">
      <span>SCROLL</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <section id="work">
    <div class="section-header">
      <span class="section-label">// 01</span>
      <h2 class="section-title">WORK</h2>
    </div>
    <div id="work-grid" class="work-grid"></div>
  </section>

  <section id="skills">
    <div class="section-header">
      <span class="section-label">// 02</span>
      <h2 class="section-title">SKILLS</h2>
    </div>
    <div id="skills-grid" class="skills-grid"></div>
  </section>

  <section id="about">
    <div class="section-header">
      <span class="section-label">// 03</span>
      <h2 class="section-title">ABOUT</h2>
    </div>
    <div id="about-content" class="about-content"></div>
  </section>

  <section id="contact">
    <div class="section-header">
      <span class="section-label">// 04</span>
      <h2 class="section-title">CONTACT</h2>
    </div>
    <div id="contact-content" class="contact-content"></div>
  </section>

  <footer>
    <span id="footer-name"></span>
    <span>Built with precision</span>
  </footer>

  <noscript>
    <div style="padding:4rem;text-align:center;font-family:monospace;color:#888">
      JavaScript is required to view this portfolio.
    </div>
  </noscript>

  <script src="js/main.js"></script>
</body>
</html>
