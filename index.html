<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shafayat Alam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="site-header">
    <div class="header-identity">
      <span class="header-name" id="header-name"></span>
      <div class="header-sub">
        <span id="header-title"></span>
        <span class="hdot">·</span>
        <span id="header-location"></span>
        <span class="hdot">·</span>
        <div class="header-contacts" id="header-contacts"></div>
      </div>
    </div>
    <nav class="header-nav">
      <a href="#work">Work</a>
      <a href="#skills">Skills</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>

    <section id="work">
      <div class="section-header">
        <h2 class="section-title">WORK</h2>
      </div>
      <div id="work-grid" class="work-grid"></div>
    </section>

    <section id="skills">
      <div class="section-header">
        <h2 class="section-title">SKILLS</h2>
      </div>
      <div id="skills-grid" class="skills-grid"></div>
    </section>

    <section id="about">
      <div class="section-header">
        <h2 class="section-title">ABOUT</h2>
      </div>
      <div id="about-content" class="about-content"></div>
    </section>

    <section id="contact">
      <div class="section-header">
        <h2 class="section-title">CONTACT</h2>
      </div>
      <div id="contact-content" class="contact-content"></div>
    </section>

    <footer>
      <span id="footer-name"></span>
      <span>Built with precision</span>
    </footer>

  </main>

  <noscript>
    <div style="padding:4rem;text-align:center;font-family:monospace;color:#888">
      JavaScript is required to view this portfolio.
    </div>
  </noscript>

  <script src="js/main.js"></script>
</body>
</html>
